services:
  - type: web
    name: ethereal-backend
    env: java
    plan: free
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/feedback-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JAVA_VERSION
        value: 17
